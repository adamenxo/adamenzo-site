<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Adam Enzo</title>
  <meta name="description" content="My social links"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="shortcut icon" href="favicon-32.jpg" type="image/jpeg"/>
  <link rel="apple-touch-icon" href="favicon-256.jpg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,900;1,900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #000;
      width: 100vw;
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .card {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 15px;
      width: 380px;
      max-width: 90vw;
      height: 650px;
      background-image: linear-gradient(#000000bf, #000000bf);
      border: 5px solid red;
      box-shadow: inset 0 0 15px 3px red, 0 0 15px 3px red;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      position: fixed;
      inset: 0;
      margin: auto;
    }

    .profile-photo {
      width: 100px;
      height: 100px;
      border-radius: 100px;
      outline: 3px solid red;
      box-shadow: 0 0 20px 4px red;
      object-fit: cover;
      margin-bottom: 0;
    }

    .name {
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 24px;
      font-weight: 900;
      font-style: normal;
      letter-spacing: -1px;
      margin-bottom: 25px;
    }

    .link-btn {
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 20px;
      width: 300px;
      max-width: 75vw;
      height: 65px;
      background-color: #00000080;
      border: 1px solid #404040;
      border-radius: 10px;
      box-shadow: inset 0 0 10px #80808080;
      text-decoration: none;
      padding: 0;
      transition: opacity 0.15s ease;
    }

    .link-btn:hover { opacity: 0.75; }

    .link-btn img {
      max-width: 15%;
      margin-left: 15px;
      flex-shrink: 0;
    }

    .link-btn .label {
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 33px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: -1px;
      text-decoration: underline red;
      text-decoration-thickness: 4.5px;
      padding-bottom: 5px;
    }

    @media (max-height: 600px) {
      .card {
        height: 570px;
        gap: 10px;
      }
      .name { margin-bottom: 10px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="profile.jpg" alt="Adam Enzo" class="profile-photo"/>
    <div class="name">Adam Enzo</div>

    <a href="https://www.instagram.com/adamenxo" target="_blank" class="link-btn">
      <img src="ig.png" alt="Instagram"/>
      <span class="label">Instagram</span>
    </a>

    <a href="https://www.tiktok.com/@adamenxo" target="_blank" class="link-btn">
      <img src="tt.png" alt="TikTok"/>
      <span class="label">TikTok</span>
    </a>

    <a href="https://www.youtube.com/@adamenxo" target="_blank" class="link-btn">
      <img src="yt.png" alt="YouTube"/>
      <span class="label">YouTube</span>
    </a>

    <a href="https://open.spotify.com/show/0nlLQe5soz7L62bM84Jhbm" target="_blank" class="link-btn">
      <img src="sf.png" alt="Podcast"/>
      <span class="label">Podcast</span>
    </a>
  </div>
</body>
</html>
